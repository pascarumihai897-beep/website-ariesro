<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aries Romania | SITE </title>
<link rel="second icon" type="lucid">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#050505;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    color:white;
}

/* Grid */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:55px 55px;
}

/* Glow */
.glow{
    position:absolute;
    width:1200px;
    height:1200px;
    background:radial-gradient(circle,
    rgba(255,215,0,0.45) 0%,
    rgba(255,215,0,0.15) 35%,
    transparent 70%);
    filter:blur(120px);
    animation:moveGlow 10s ease-in-out infinite;
}

/* Raze */
.rays{
    position:absolute;
    width:1400px;
    height:1400px;
    background:conic-gradient(
        transparent,
        rgba(255,215,0,0.1),
        transparent,
        rgba(255,215,0,0.05),
        transparent
    );
    filter:blur(80px);
    animation:rotate 15s linear infinite;
}

.content{
    text-align:center;
    z-index:5;
}

h1{
    font-size:150px;
    font-weight:900;
    letter-spacing:5px;
    animation:textGlow 4s ease-in-out infinite;
}

.subtitle{
    margin-top:10px;
    color:#cfcfcf;
    font-size:18px;
}

.subtitle span{
    color:#ffd700;
    font-weight:bold;
}

/* Footer */
.footer{
    position:absolute;
    bottom:40px;
    width:100%;
    text-align:center;
    z-index:10;
}

.footer a{
    color:#ffd700;
    text-decoration:none;
    margin:0 10px;
    transition:0.3s;
}

.footer a:hover{
    color:white;
}

/* Modal */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    background:#111;
    border:1px solid rgba(255,215,0,0.3);
    width:450px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 30px rgba(255,215,0,0.2);
}

.modal-content h2{
    text-align:center;
    color:#ffd700;
    margin-bottom:20px;
}

.staff p{
    padding:10px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.close{
    float:right;
    font-size:30px;
    cursor:pointer;
    color:#ffd700;
}

.close:hover{
    color:white;
}

@keyframes moveGlow{
    0%{
        transform:translate(-350px,-150px);
    }
    50%{
        transform:translate(350px,150px);
    }
    100%{
        transform:translate(-350px,-150px);
    }
}

@keyframes rotate{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

@keyframes textGlow{
    0%,100%{
        text-shadow:
        0 0 15px rgba(255,255,255,0.2),
        0 0 30px rgba(255,215,0,0.2);
    }

    50%{
        text-shadow:
        0 0 20px rgba(255,255,255,0.6),
        0 0 50px rgba(255,215,0,0.8),
        0 0 100px rgba(255,215,0,0.5);
    }
}
</style>
</head>

<body>

<div class="glow"></div>
<div class="rays"></div>

<div class="content">
    <h1>SOON</h1>

    <div class="subtitle">
        Pregătim ceva maret !!! —
        <span>#Ariesro</span>
    </div>
</div>

<div class="footer">
    <a href="#">tx</a> //
    <a href="#" onclick="openAdmins()">admin panel</a> //
    <a href="Regulament.html">regulamente</a>
    
</div>

<div class="modal" id="adminModal">
    <div class="modal-content">

        <span class="close" onclick="closeAdmins()">&times;</span>

        <h2>Staff Server</h2>

        <div class="staff">
            <p><b>alexe_sefu</b> - Fondator</p>
            <p><b>Jipsy</b> - Fondator</p>
             <p><b>SKRPAU</b> - DEVELOPER</p>
            <p><b>Dominic</b> - Coordonator Server</p>
            <p><b>Caluboss</b> - Coordonator Server</p>
        </div>

    </div>
</div>

<script>
function openAdmins(){
    document.getElementById("adminModal").style.display = "flex";
}

function closeAdmins(){
    document.getElementById("adminModal").style.display = "none";
}

window.onclick = function(event){
    let modal = document.getElementById("adminModal");

    if(event.target == modal){
        modal.style.display = "none";
    }
}
</script>

</body>
</html>
